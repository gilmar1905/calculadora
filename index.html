<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Motor Executivo: Surebet Base + Recuperação em Cascata</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #020617; color: #e2e8f0; font-family: sans-serif; }
        .card { background-color: #0f172a; border: 1px solid #1e293b; padding: 15px; border-radius: 8px; }
        input { background: #1e293b; border: 1px solid #334155; padding: 5px; width: 100%; border-radius: 4px; color: #f1f5f9; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-5xl mx-auto space-y-6">
        <h1 class="text-2xl font-black text-white text-center">⚡ SISTEMA DE RECUPERAÇÃO EM CASCATA</h1>
        
        <div id="mGrade" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        
        <div class="bg-slate-900 p-6 rounded-lg border border-slate-700 text-center">
            <h2 class="text-xs uppercase font-bold text-slate-400">Total do Custo Acumulado (Dívida)</h2>
            <div id="mTotalDivida" class="text-3xl font-black text-white">R$ 0,00</div>
        </div>
    </div>

<script>
    // Card 1 e 2 são a Surebet (Bloco 0)
    // Card 3, 4, 5... são as recuperações
    let banco = [
        { id: 1, tipo: 'surebet', oddA: 1.65, oddB: 2.10, stakeA: 20.0, stakeB: 20.0 },
        { id: 2, tipo: 'surebet', oddA: 2.45, oddB: 2.70, stakeA: 10.0, stakeB: 10.0 },
        { id: 3, tipo: 'recuperacao', oddA: 8.86, oddB: 8.32, stakeA: 5.0, stakeB: 5.0 },
        { id: 4, tipo: 'recuperacao', oddA: 21.90, oddB: 28.32, stakeA: 3.0, stakeB: 3.0 }
    ];

    function processar() {
        let custoSurebet = 0;
        let custoAcumuladoRecuperacao = 0;

        // 1. Calcula o custo da Surebet (1 e 2 juntos)
        banco.filter(x => x.tipo === 'surebet').forEach(j => {
            custoSurebet += (parseFloat(document.getElementById(`stkA_${j.id}`).value || 0) + parseFloat(document.getElementById(`stkB_${j.id}`).value || 0));
        });

        document.getElementById('mTotalDivida').innerText = `R$ ${custoSurebet.toFixed(2)}`;

        // 2. Calcula as recuperações
        banco.forEach(j => {
            if (j.tipo === 'recuperacao') {
                let sA = parseFloat(document.getElementById(`stkA_${j.id}`).value || 0);
                let sB = parseFloat(document.getElementById(`stkB_${j.id}`).value || 0);
                
                // O custo que este card precisa recuperar é: (Surebet Total + Acumulado das recuperações anteriores + O próprio)
                let custoTotalParaRecuperar = custoSurebet + custoAcumuladoRecuperacao + sA + sB;
                
                let oA = parseFloat(document.getElementById(`oddA_${j.id}`).value || 0);
                let oB = parseFloat(document.getElementById(`oddB_${j.id}`).value || 0);
                
                document.getElementById(`res_${j.id}`).innerText = 
                    `Líq A: ${(sA * oA - custoTotalParaRecuperar).toFixed(2)} | Líq B: ${(sB * oB - custoTotalParaRecuperar).toFixed(2)}`;
                
                // Acumula o custo das recuperações para o próximo card saber
                custoAcumuladoRecuperacao += (sA + sB);
            }
        });
    }

    function renderizar() {
        const grade = document.getElementById('mGrade');
        grade.innerHTML = '';
        banco.forEach(j => {
            grade.innerHTML += `
            <div class="card">
                <div class="font-bold text-sm mb-2">${j.tipo === 'surebet' ? 'SUREBET BASE (1 e 2)' : 'RECUPERAÇÃO CARD ' + j.id}</div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="oddA_${j.id}" value="${j.oddA}" oninput="processar()" placeholder="Odd A">
                    <input type="number" id="oddB_${j.id}" value="${j.oddB}" oninput="processar()" placeholder="Odd B">
                    <input type="number" id="stkA_${j.id}" value="${j.stakeA}" oninput="processar()" placeholder="Stk A">
                    <input type="number" id="stkB_${j.id}" value="${j.stakeB}" oninput="processar()" placeholder="Stk B">
                </div>
                <div class="mt-3 text-xs font-bold text-emerald-400" id="res_${j.id}"></div>
            </div>`;
        });
        processar();
    }
    renderizar();
</script>
</body>
</html>
