<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Executivo de Recuperação Surebet</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: sans-serif; }
        .input-box { background: #0f172a; border: 1px solid #334155; padding: 8px; border-radius: 6px; width: 100%; text-align: center; }
        .card { background: #0f172a; border: 1px solid #1e293b; padding: 16px; border-radius: 12px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto space-y-6">
        <h1 class="text-2xl font-black text-white text-center uppercase tracking-widest">⚡ Painel Executivo Surebet + 5 Cards de Recuperação</h1>

        <div class="card border-l-4 border-l-indigo-500">
            <h2 class="font-bold text-indigo-400 mb-4">SUREBET BASE (Jogo 1 + Jogo 2)</h2>
            <div class="grid grid-cols-4 gap-4">
                <input type="number" id="montanteTotal" placeholder="Montante Total" oninput="processar()" class="input-box border-emerald-500">
                <input type="number" id="oddDupla" placeholder="Odd Dupla (J1)" oninput="processar()" class="input-box">
                <input type="number" id="oddProtA" placeholder="Odd Prot A (J2)" oninput="processar()" class="input-box">
                <input type="number" id="oddProtB" placeholder="Odd Prot B (J2)" oninput="processar()" class="input-box">
            </div>
            <div class="mt-4 grid grid-cols-3 gap-4 text-xs font-bold text-emerald-400" id="resSurebet"></div>
        </div>

        <div id="mGrade" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>

<script>
    let recuperacoes = [2, 3, 4, 5, 6];

    function processar() {
        const total = parseFloat(document.getElementById('montanteTotal').value) || 0;
        const oD = parseFloat(document.getElementById('oddDupla').value) || 1;
        const oA = parseFloat(document.getElementById('oddProtA').value) || 1;
        const oB = parseFloat(document.getElementById('oddProtB').value) || 1;

        // Distribuição simples (1/3 para cada)
        const stake = total / 3;
        const retD = (stake * oD) - total;
        const retA = (stake * oA) - total;
        const retB = (stake * oB) - total;

        document.getElementById('resSurebet').innerHTML = 
            `<div>Líq Dupla: R$ ${retD.toFixed(2)}</div><div>Líq Prot A: R$ ${retA.toFixed(2)}</div><div>Líq Prot B: R$ ${retB.toFixed(2)}</div>`;

        let custoAcumulado = total;
        
        recuperacoes.forEach(id => {
            const sA = parseFloat(document.getElementById(`stkA_${id}`).value) || 0;
            const sB = parseFloat(document.getElementById(`stkB_${id}`).value) || 0;
            const oA = parseFloat(document.getElementById(`oddA_${id}`).value) || 1;
            const oB = parseFloat(document.getElementById(`oddB_${id}`).value) || 1;

            custoAcumulado += (sA + sB);
            const liqA = (sA * oA) - custoAcumulado;
            const liqB = (sB * oB) - custoAcumulado;

            document.getElementById(`res_${id}`).innerText = `Líq A: ${liqA.toFixed(2)} | Líq B: ${liqB.toFixed(2)}`;
        });
    }

    function renderizar() {
        const grade = document.getElementById('mGrade');
        recuperacoes.forEach(id => {
            grade.innerHTML += `
            <div class="card">
                <div class="font-bold mb-2">RECUPERAÇÃO CARD ${id-1}</div>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="number" id="oddA_${id}" placeholder="Odd A" oninput="processar()" class="input-box">
                    <input type="number" id="oddB_${id}" placeholder="Odd B" oninput="processar()" class="input-box">
                    <input type="number" id="stkA_${id}" placeholder="Stk A" oninput="processar()" class="input-box">
                    <input type="number" id="stkB_${id}" placeholder="Stk B" oninput="processar()" class="input-box">
                </div>
                <div class="text-[10px] font-bold text-emerald-400" id="res_${id}"></div>
            </div>`;
        });
    }
    renderizar();
</script>
</body>
</html>
