<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Motor Executivo: Surebet Dinâmica + Cascata de Proteção</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        input { background-color: #1e293b; border: 1px solid #334155; padding: 4px; text-align: center; border-radius: 4px; color: #f8fafc; }
        .card { background-color: #020617; border: 1px solid #1e293b; padding: 16px; border-radius: 12px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto space-y-6">
        <h1 class="text-3xl font-black text-white uppercase text-center">⚡ MOTOR EXECUTIVO SUREBET DINÂMICA</h1>
        
        <div id="mGrade" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div class="bg-indigo-950 p-6 rounded-xl border border-indigo-800 text-center">
            <h2 class="text-sm font-bold text-indigo-300 uppercase">Resumo da Auditoria</h2>
            <div id="mAuditoria" class="text-2xl font-black mt-2 text-white">R$ 0,00</div>
        </div>
    </div>

<script>
    // Estrutura: Card 1 é a Dupla (Base), Card 2 é Proteção A/B, Cards 3+ são Cascata
    let banco = [
        { id: 1, tipo: 'dupla', odd: 1.65, stake: 30.0 },
        { id: 2, tipo: 'protecao', oddA: 2.45, oddB: 2.70, stakeA: 11.5, stakeB: 10.0 },
        { id: 3, tipo: 'protecao', oddA: 8.86, oddB: 8.32, stakeA: 3.8, stakeB: 4.0 },
        { id: 4, tipo: 'protecao', oddA: 21.90, oddB: 28.32, stakeA: 2.5, stakeB: 2.0 },
        { id: 5, tipo: 'protecao', oddA: 81.84, oddB: 92.11, stakeA: 3.0, stakeB: 3.0 }
    ];

    function processar() {
        let custoAcumulado = 0;
        
        // 1. Calcular Custo do Bloco Inicial (Card 1 + 2)
        let stk1 = parseFloat(document.getElementById(`stk_1`).value) || 0;
        let stk2A = parseFloat(document.getElementById(`stkA_2`).value) || 0;
        let stk2B = parseFloat(document.getElementById(`stkB_2`).value) || 0;
        let custoBlocoInicial = stk1 + stk2A + stk2B;

        banco.forEach((j) => {
            let resDisplay = document.getElementById(`res_${j.id}`);
            
            if (j.tipo === 'dupla') {
                let o = parseFloat(document.getElementById(`odd_${j.id}`).value) || 0;
                let s = parseFloat(document.getElementById(`stk_${j.id}`).value) || 0;
                let ret = (s * o) - custoBlocoInicial;
                resDisplay.innerHTML = `Líquido Bloco: <span class="${ret>=0?'text-emerald-400':'text-red-400'}">R$ ${ret.toFixed(2)}</span>`;
            } 
            else if (j.id === 2) {
                let oA = parseFloat(document.getElementById(`oddA_2`).value) || 0;
                let oB = parseFloat(document.getElementById(`oddB_2`).value) || 0;
                let retA = (stk2A * oA) - custoBlocoInicial;
                let retB = (stk2B * oB) - custoBlocoInicial;
                resDisplay.innerHTML = `Líq A: ${retA.toFixed(2)} | Líq B: ${retB.toFixed(2)}`;
            }
            else {
                // Cascata: Pega o custo dele próprio e soma o que já passou
                let sA = parseFloat(document.getElementById(`stkA_${j.id}`).value) || 0;
                let sB = parseFloat(document.getElementById(`stkB_${j.id}`).value) || 0;
                custoAcumulado += (sA + sB);
                
                let oA = parseFloat(document.getElementById(`oddA_${j.id}`).value) || 0;
                let oB = parseFloat(document.getElementById(`oddB_${j.id}`).value) || 0;
                
                resDisplay.innerHTML = `Líq A: ${(sA * oA - (custoBlocoInicial + custoAcumulado)).toFixed(2)} | Líq B: ${(sB * oB - (custoBlocoInicial + custoAcumulado)).toFixed(2)}`;
            }
        });
    }

    function renderizar() {
        const grade = document.getElementById('mGrade');
        grade.innerHTML = '';
        banco.forEach(j => {
            let html = `<div class="card">
                <div class="font-black mb-3 border-b border-slate-800 pb-2">${j.tipo === 'dupla' ? 'CARD 1: DUPLA (ORIGEM)' : 'CARD ' + j.id + (j.id===2?' (PROTEÇÃO INICIAL)':' (CASCATA)')}</div>`;
            
            if (j.tipo === 'dupla') {
                html += `<input type="number" id="odd_${j.id}" value="${j.odd}" oninput="processar()" placeholder="Odd">
                         <input type="number" id="stk_${j.id}" value="${j.stake}" oninput="processar()" placeholder="Stake">`;
            } else {
                html += `<div class="grid grid-cols-2 gap-2">
                         <input type="number" id="oddA_${j.id}" value="${j.oddA}" oninput="processar()" placeholder="Odd A">
                         <input type="number" id="oddB_${j.id}" value="${j.oddB}" oninput="processar()" placeholder="Odd B">
                         <input type="number" id="stkA_${j.id}" value="${j.stakeA}" oninput="processar()" placeholder="Stk A">
                         <input type="number" id="stkB_${j.id}" value="${j.stakeB}" oninput="processar()" placeholder="Stk B"></div>`;
            }
            html += `<div class="mt-4 text-xs font-bold" id="res_${j.id}"></div></div>`;
            grade.innerHTML += html;
        });
        processar();
    }
    renderizar();
</script>
</body>
</html>
