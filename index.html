<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Motor Surebet Executivo - Versão Final Unificada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: Arial, sans-serif; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto space-y-6">
        <div class="bg-slate-950 p-6 rounded-xl border border-slate-800">
            <h1 class="text-xl font-black text-white mb-4">MOTOR SUREBET EXECUTIVO</h1>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] text-slate-400">APOSTA PRINCIPAL (R$)</label>
                    <input type="number" id="mstkApostaPrincipal" value="30.00" oninput="processarCalculos()" class="w-full bg-slate-900 border border-slate-700 p-2 text-emerald-400 font-bold rounded">
                </div>
                <div>
                    <label class="text-[10px] text-slate-400">ODD ACUMULADA</label>
                    <input type="number" id="moddTotalPrincipal" value="369.32" oninput="processarCalculos()" class="w-full bg-slate-900 border border-slate-700 p-2 text-indigo-400 font-bold rounded">
                </div>
            </div>
        </div>

        <button onclick="adicionarCard()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded w-full">➕ ADICIONAR CARD</button>

        <div id="containerCards" class="space-y-4"></div>
    </div>

    <script>
        let cards = [
            { id: 1, ativo: true, oddA: 2.45, oddB: 2.70, stakeA: 0, stakeB: 0 },
            { id: 2, ativo: true, oddA: 8.86, oddB: 8.32, stakeA: 0, stakeB: 0 },
            { id: 3, ativo: true, oddA: 21.90, oddB: 28.32, stakeA: 0, stakeB: 0 },
            { id: 4, ativo: true, oddA: 81.84, oddB: 92.11, stakeA: 0, stakeB: 0 },
            { id: 5, ativo: true, oddA: 232.53, oddB: 323.52, stakeA: 0, stakeB: 0 }
        ];

        function adicionarCard() {
            const id = cards.length > 0 ? Math.max(...cards.map(c => c.id)) + 1 : 1;
            cards.push({ id, ativo: true, oddA: 2.00, oddB: 2.00, stakeA: 0, stakeB: 0 });
            renderizar();
        }

        function excluirCard(id) {
            cards = cards.filter(c => c.id !== id);
            renderizar();
        }

        function ajustar(id, campo, delta) {
            const card = cards.find(c => c.id === id);
            if (campo === 'A') card.stakeA = Math.max(0, card.stakeA + delta);
            if (campo === 'B') card.stakeB = Math.max(0, card.stakeB + delta);
            renderizar();
        }

        function renderizar() {
            const container = document.getElementById('containerCards');
            container.innerHTML = '';
            
            cards.forEach(c => {
                const div = document.createElement('div');
                div.className = "bg-slate-900 p-4 rounded border border-slate-700";
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" ${c.ativo ? 'checked' : ''} onchange="cards.find(x=>x.id==${c.id}).ativo=this.checked; processarCalculos()">
                            <span class="font-bold">CARD ${c.id}</span>
                        </div>
                        <button onclick="excluirCard(${c.id})" class="text-red-400 text-xs font-bold">EXCLUIR</button>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <input type="number" value="${c.oddA}" oninput="cards.find(x=>x.id==${c.id}).oddA=parseFloat(this.value); processarCalculos()" class="bg-slate-800 p-1 text-center text-xs">
                        <input type="number" value="${c.oddB}" oninput="cards.find(x=>x.id==${c.id}).oddB=parseFloat(this.value); processarCalculos()" class="bg-slate-800 p-1 text-center text-xs">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="flex gap-1 items-center">
                            <button onclick="ajustar(${c.id}, 'A', -1)" class="bg-slate-700 px-2 rounded">-1</button>
                            <input type="number" value="${c.stakeA}" oninput="cards.find(x=>x.id==${c.id}).stakeA=parseFloat(this.value); processarCalculos()" class="w-full bg-slate-950 p-1 text-emerald-400 text-center">
                            <button onclick="ajustar(${c.id}, 'A', 1)" class="bg-slate-700 px-2 rounded">+1</button>
                        </div>
                        <div class="flex gap-1 items-center">
                            <button onclick="ajustar(${c.id}, 'B', -1)" class="bg-slate-700 px-2 rounded">-1</button>
                            <input type="number" value="${c.stakeB}" oninput="cards.find(x=>x.id==${c.id}).stakeB=parseFloat(this.value); processarCalculos()" class="w-full bg-slate-950 p-1 text-emerald-400 text-center">
                            <button onclick="ajustar(${c.id}, 'B', 1)" class="bg-slate-700 px-2 rounded">+1</button>
                        </div>
                    </div>
                    <div class="mt-3 flex justify-between text-[10px] uppercase font-bold text-slate-500">
                        <span>Custo na Rota: <span id="custo_${c.id}" class="text-white">R$ 0,00</span></span>
                        <span>Liq A: <span id="liqA_${c.id}" class="text-white">R$ 0,00</span></span>
                        <span>Liq B: <span id="liqB_${c.id}" class="text-white">R$ 0,00</span></span>
                    </div>
                `;
                container.appendChild(div);
            });
            processarCalculos();
        }

        function processarCalculos() {
            let divida = parseFloat(document.getElementById('mstkApostaPrincipal').value) || 0;
            
            cards.forEach(c => {
                const elCusto = document.getElementById(`custo_${c.id}`);
                const elLiqA = document.getElementById(`liqA_${c.id}`);
                const elLiqB = document.getElementById(`liqB_${c.id}`);

                if (!c.ativo) {
                    elCusto.innerText = "R$ 0,00";
                    return;
                }

                let custoTotalDesteCenario = divida + c.stakeA + c.stakeB;
                elCusto.innerText = `R$ ${custoTotalDesteCenario.toFixed(2)}`;

                let liqA = (c.stakeA * c.oddA) - custoTotalDesteCenario;
                let liqB = (c.stakeB * c.oddB) - custoTotalDesteCenario;

                elLiqA.innerText = `R$ ${liqA.toFixed(2)}`;
                elLiqA.className = liqA >= 0 ? "text-emerald-400 font-bold" : "text-red-400 font-bold";
                
                elLiqB.innerText = `R$ ${liqB.toFixed(2)}`;
                elLiqB.className = liqB >= 0 ? "text-emerald-400 font-bold" : "text-red-400 font-bold";

                divida += (c.stakeA + c.stakeB);
            });
        }

        renderizar();
    </script>
</body>
</html>
