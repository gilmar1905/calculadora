<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Executivo Surebet - Motor de Desconto</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-white p-6">
    <div class="max-w-7xl mx-auto space-y-6">
        <div class="bg-slate-950 p-6 rounded-xl border border-slate-800 shadow-xl">
            <h1 class="text-xl font-black text-white">⚡ MOTOR DE DESCONTO NO LÍQUIDO</h1>
            <div class="grid grid-cols-2 gap-4 mt-4">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Aposta Principal (R$)</label>
                    <input type="number" id="mstk" value="30.00" oninput="processar()" class="w-full bg-slate-900 p-2 rounded text-emerald-400 font-black">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Odd Principal</label>
                    <input type="number" id="modd" value="369.32" oninput="processar()" class="w-full bg-slate-900 p-2 rounded text-indigo-400 font-black">
                </div>
            </div>
            <div class="mt-4 p-3 bg-slate-900 rounded border border-slate-800 text-center">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Líquido Disponível Após Coberturas:</span>
                <div id="liqDisponivel" class="text-2xl font-black text-emerald-400">R$ 0,00</div>
            </div>
        </div>

        <div id="mGrade" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>

<script>
    let banco = [
        { id: 1, oddA: 2.45, oddB: 2.70, stakeA: 11.5, stakeB: 10.0 },
        { id: 2, oddA: 8.86, oddB: 8.32, stakeA: 3.8, stakeB: 4.0 },
        { id: 3, oddA: 21.90, oddB: 28.32, stakeA: 2.5, stakeB: 2.0 },
        { id: 4, oddA: 81.84, oddB: 92.11, stakeA: 3.0, stakeB: 3.0 },
        { id: 5, oddA: 232.53, oddB: 323.52, stakeA: 1.0, stakeB: 1.0 }
    ];

    function processar() {
        const mStk = parseFloat(document.getElementById('mstk').value) || 0;
        const mOdd = parseFloat(document.getElementById('modd').value) || 0;
        
        // Lucro máximo da principal (o seu "pote")
        let lucroBruto = (mStk * mOdd) - mStk;
        
        banco.forEach(j => {
            // Pega os valores dos inputs de cada card
            j.oddA = parseFloat(document.getElementById(`oddA_${j.id}`).value) || 0;
            j.oddB = parseFloat(document.getElementById(`oddB_${j.id}`).value) || 0;
            j.stakeA = parseFloat(document.getElementById(`stkA_${j.id}`).value) || 0;
            j.stakeB = parseFloat(document.getElementById(`stkB_${j.id}`).value) || 0;
            
            // Abate o custo de cada card do lucro principal
            lucroBruto -= (j.stakeA + j.stakeB);
            
            // Calcula o retorno individual de cada lado do card
            let retA = (j.stakeA * j.oddA) - j.stakeA;
            let retB = (j.stakeB * j.oddB) - j.stakeB;
            
            document.getElementById(`retA_${j.id}`).innerText = `Ret. A: ${retA.toFixed(2)}`;
            document.getElementById(`retB_${j.id}`).innerText = `Ret. B: ${retB.toFixed(2)}`;
        });
        
        document.getElementById('liqDisponivel').innerText = `R$ ${lucroBruto.toFixed(2)}`;
    }

    function renderizar() {
        const grade = document.getElementById('mGrade');
        grade.innerHTML = '';
        banco.forEach(j => {
            grade.innerHTML += `
            <div class="bg-slate-950 p-4 border border-slate-800 rounded-lg">
                <div class="font-bold mb-2">CARD ${j.id}</div>
                <div class="grid grid-cols-2 gap-2 mb-2">
                    <input type="number" id="oddA_${j.id}" value="${j.oddA}" oninput="processar()" class="bg-slate-900 p-1 text-center text-xs" placeholder="Odd A">
                    <input type="number" id="oddB_${j.id}" value="${j.oddB}" oninput="processar()" class="bg-slate-900 p-1 text-center text-xs" placeholder="Odd B">
                    <input type="number" id="stkA_${j.id}" value="${j.stakeA}" oninput="processar()" class="bg-slate-900 p-1 text-center text-xs text-emerald-400" placeholder="Stk A">
                    <input type="number" id="stkB_${j.id}" value="${j.stakeB}" oninput="processar()" class="bg-slate-900 p-1 text-center text-xs text-emerald-400" placeholder="Stk B">
                </div>
                <div class="text-[10px] font-bold text-slate-500" id="retA_${j.id}">Ret. A: 0</div>
                <div class="text-[10px] font-bold text-slate-500" id="retB_${j.id}">Ret. B: 0</div>
            </div>`;
        });
        processar();
    }
    renderizar();
</script>
</body>
</html>
