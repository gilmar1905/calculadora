<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Surebet - Motor de Desconto no Líquido</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-white p-6">
    <div class="max-w-7xl mx-auto space-y-6">
        <div class="bg-slate-950 p-6 rounded-xl border border-slate-800">
            <h1 class="text-xl font-black">⚡ MOTOR DE DESCONTO NO LÍQUIDO</h1>
            <div class="grid grid-cols-2 gap-4 mt-4">
                <div>
                    <label class="text-[10px] text-slate-400">Aposta Principal</label>
                    <input type="number" id="mstk" value="30.00" oninput="processar()" class="w-full bg-slate-900 p-2">
                </div>
                <div>
                    <label class="text-[10px] text-slate-400">Odd Principal</label>
                    <input type="number" id="modd" value="369.32" oninput="processar()" class="w-full bg-slate-900 p-2">
                </div>
            </div>
            <div class="mt-4 text-emerald-400 font-bold">Líquido Base: R$ <span id="liqBase">0</span></div>
        </div>
        <div id="mGrade" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

<script>
    let banco = [
        { id: 1, oddA: 2.45, oddB: 2.70, stakeA: 11.5, stakeB: 10.0 },
        { id: 2, oddA: 8.86, oddB: 8.32, stakeA: 3.8, stakeB: 4.0 },
        { id: 3, oddA: 21.90, oddB: 28.32, stakeA: 2.5, stakeB: 2.0 },
        { id: 4, oddA: 81.84, oddB: 92.11, stakeA: 3.0, stakeB: 3.0 },
        { id: 5, oddA: 232.53, oddB: 323.52, stakeA: 1.0, stakeB: 1.0 }
    ];

    function processar() {
        const mStk = parseFloat(document.getElementById('mstk').value) || 0;
        const mOdd = parseFloat(document.getElementById('modd').value) || 0;
        const lucroBrutoPrincipal = (mStk * mOdd) - mStk;
        
        let liquidoDisponivel = lucroBrutoPrincipal;
        document.getElementById('liqBase').innerText = liquidoDisponivel.toFixed(2);

        banco.forEach((j, index) => {
            // Regra: Cards 1 e 2 abatem do líquido principal. Cards 3+ abatem do líquido restante.
            let desconto = (j.stakeA + j.stakeB);
            liquidoDisponivel -= desconto;

            document.getElementById(`info_${j.id}`).innerText = `Líquido após desconto: R$ ${liquidoDisponivel.toFixed(2)}`;
            
            // O cálculo de cobertura agora reflete a capacidade de pagamento do líquido restante
            let capacidadeA = (j.stakeA * j.oddA) - j.stakeA;
            let capacidadeB = (j.stakeB * j.oddB) - j.stakeB;
            
            document.getElementById(`capA_${j.id}`).innerText = `Retorno A: ${capacidadeA.toFixed(2)}`;
            document.getElementById(`capB_${j.id}`).innerText = `Retorno B: ${capacidadeB.toFixed(2)}`;
        });
    }

    function renderizar() {
        const grade = document.getElementById('mGrade');
        banco.forEach(j => {
            grade.innerHTML += `
            <div class="bg-slate-950 p-4 border border-slate-800">
                <div class="font-bold">CARD ${j.id}</div>
                <input type="number" value="${j.stakeA}" oninput="banco.find(x=>x.id==${j.id}).stakeA=parseFloat(this.value); processar()" class="bg-slate-900 w-20">
                <input type="number" value="${j.stakeB}" oninput="banco.find(x=>x.id==${j.id}).stakeB=parseFloat(this.value); processar()" class="bg-slate-900 w-20">
                <div class="text-[10px] mt-2" id="info_${j.id}"></div>
                <div class="text-[10px]" id="capA_${j.id}"></div>
                <div class="text-[10px]" id="capB_${j.id}"></div>
            </div>`;
        });
        processar();
    }
    renderizar();
</script>
</body>
</html>
