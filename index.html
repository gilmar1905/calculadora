<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Proteção - Modo D (Completo)</title>

<style>
:root {
    --bg:#f5f5f5;
    --card:#fff;
    --text:#222;
    --primary:#2e7d32;
    --accent:#0288d1;
}

body.dark {
    --bg:#121212;
    --card:#1e1e1e;
    --text:#eaeaea;
}

body {
    margin:0;
    font-family: Arial;
    background:var(--bg);
    color:var(--text);
}

.container {
    max-width:900px;
    margin:auto;
    padding:15px;
}

.card {
    background:var(--card);
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
}

input {
    width:100%;
    padding:8px;
    margin-top:5px;
}

button {
    width:100%;
    padding:12px;
    background:var(--primary);
    color:#fff;
    border:0;
    cursor:pointer;
}

.result {
    margin-top:10px;
    font-size:14px;
    white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h3>Múltipla Principal</h3>

<label>Valor</label>
<input id="valor" type="number" value="100">

<label>Odd Total</label>
<input id="odd" type="number" value="4.0">

<label>Margem (%)</label>
<input id="margem" type="number" value="0">
</div>

<div id="jogos"></div>

<div class="card">
<button onclick="calcular()">CALCULAR MODO D</button>
<div id="saida"></div>
</div>

</div>

<script>

const TOTAL = 3;

// monta jogos
let div = document.getElementById("jogos");
for (let i=1;i<=TOTAL;i++){
div.innerHTML += `
<div class="card">
<h3>Jogo ${i}</h3>

<label>Odd Empate</label>
<input id="e${i}" type="number" value="3">

<label>Odd Visitante</label>
<input id="v${i}" type="number" value="3">

<label><input type="checkbox" id="le${i}" checked> Lucro Empate</label>
<label><input type="checkbox" id="lv${i}" checked> Lucro Visitante</label>

<div id="r${i}" class="result"></div>
</div>`;
}

function calcular(){

let valor = +document.getElementById("valor").value;
let odd = +document.getElementById("odd").value;
let margem = +document.getElementById("margem").value/100;

let custo = valor;
let log = "";

let apostas = [];

// 3 múltiplas iniciais
let m1 = valor*0.4;
let m2 = valor*0.3;
let m3 = valor*0.3;

custo += m1+m2+m3;

log += `CUSTO INICIAL: ${custo.toFixed(2)}\n\n`;

// ===== SIMULAÇÃO JOGOS =====
for(let i=1;i<=TOTAL;i++){

let e = +document.getElementById("e"+i).value;
let v = +document.getElementById("v"+i).value;

let le = document.getElementById("le"+i).checked;
let lv = document.getElementById("lv"+i).checked;

let meta = custo * (1 + margem);

// ajustes
if(!le && !lv){
meta = custo;
}

let ae = meta/(e-1);
let av = meta/(v-1);

custo += ae+av;

apostas.push({ae,av});

log += `JOGO ${i}
Empate: ${ae.toFixed(2)} | Visitante: ${av.toFixed(2)}
Custo acumulado: ${custo.toFixed(2)}\n\n`;

}

// ===== RESULTADOS =====
let retorno = valor * odd;
let lucro = retorno - custo;

let status =
lucro>0 ? "🟢 LUCRATIVO"
: lucro===0 ? "🟡 BREAK-EVEN"
: "🔴 INVIÁVEL";

log += `====================
RETORNO: ${retorno.toFixed(2)}
CUSTO TOTAL: ${custo.toFixed(2)}
LUCRO: ${lucro.toFixed(2)}
STATUS: ${status}`;

document.getElementById("saida").innerText = log;

}

</script>

</body>
</html>
