<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Executivo Surebet - Sistema Avançado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #0f172a; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="text-slate-100 p-6 custom-scrollbar">

<div class="max-w-7xl mx-auto space-y-6">
    <div class="flex justify-between items-center bg-slate-950 p-6 rounded-xl border border-slate-800 shadow-xl">
        <h1 class="text-2xl font-black text-white">⚡ MOTOR SUREBET EXECUTIVO</h1>
        <button onclick="salvarCenário()" class="bg-indigo-600 px-4 py-2 rounded font-bold text-xs">SALVAR CENÁRIO</button>
    </div>

    <div class="bg-slate-950 p-6 rounded-xl border border-slate-800">
        <h2 class="text-xs font-bold uppercase mb-4 text-slate-400">Principal (Aposta Mãe)</h2>
        <input type="number" id="mstkApostaPrincipal" value="1.00" step="0.01" oninput="processarCalculos()" class="w-full bg-slate-900 p-3 rounded font-black text-emerald-400 text-xl border border-slate-700">
    </div>

    <div id="mGrade" class="space-y-4"></div>

    <button onclick="adicionarCard()" class="w-full bg-emerald-700 p-4 rounded font-bold text-xs uppercase">Adicionar Card</button>

    <div class="bg-slate-950 p-6 rounded-xl border border-slate-800">
        <h2 class="text-xs font-bold uppercase mb-4 text-slate-400">Consolidação Geral</h2>
        <div id="mtxtCustoTotal" class="text-3xl font-black text-white">R$ 0,00</div>
    </div>
</div>

<script>
    // Estado inicial dos jogos conforme seu PDF
    let banco = [
        { id: 1, oddA: 2.45, oddB: 2.70, stakeA: 11.5, stakeB: 10.0 },
        { id: 2, oddA: 8.86, oddB: 8.32, stakeA: 3.8, stakeB: 4.0 },
        { id: 3, oddA: 21.90, oddB: 28.32, stakeA: 2.5, stakeB: 2.0 },
        { id: 4, oddA: 81.84, oddB: 92.11, stakeA: 3.0, stakeB: 3.0 },
        { id: 5, oddA: 232.53, oddB: 323.52, stakeA: 1.0, stakeB: 1.0 }
    ];

    function renderizar() {
        const grade = document.getElementById('mGrade');
        grade.innerHTML = '';
        banco.forEach(j => {
            grade.innerHTML += `
            <div class="bg-slate-950 p-4 rounded border border-slate-800">
                <div class="flex justify-between text-[10px] font-bold mb-2">
                    <span class="text-slate-400">CARD #${j.id}</span>
                    <button onclick="deletarCard(${j.id})" class="text-red-500">EXCLUIR</button>
                </div>
                <div class="grid grid-cols-4 gap-2">
                    <input type="number" value="${j.oddA}" oninput="banco.find(x=>x.id==${j.id}).oddA=parseFloat(this.value)||0; processarCalculos()" class="bg-slate-900 p-2 text-center text-xs">
                    <input type="number" value="${j.oddB}" oninput="banco.find(x=>x.id==${j.id}).oddB=parseFloat(this.value)||0; processarCalculos()" class="bg-slate-900 p-2 text-center text-xs">
                    <input type="number" value="${j.stakeA}" oninput="banco.find(x=>x.id==${j.id}).stakeA=parseFloat(this.value)||0; processarCalculos()" class="bg-slate-900 p-2 text-center text-xs text-emerald-400 font-bold">
                    <input type="number" value="${j.stakeB}" oninput="banco.find(x=>x.id==${j.id}).stakeB=parseFloat(this.value)||0; processarCalculos()" class="bg-slate-900 p-2 text-center text-xs text-emerald-400 font-bold">
                </div>
                <div class="text-[10px] text-slate-400 mt-2">
                    Custo Acumulado: <span id="c_${j.id}" class="text-white">0</span> | 
                    Liq A: <span id="la_${j.id}">0</span> | 
                    Liq B: <span id="lb_${j.id}">0</span>
                </div>
            </div>`;
        });
        processarCalculos();
    }

    function processarCalculos() {
        let custoAcumulado = parseFloat(document.getElementById('mstkApostaPrincipal').value) || 0;
        
        banco.forEach(j => {
            // A lógica de cascata: soma o custo da aposta mãe + todos os cards anteriores até este
            custoAcumulado += (j.stakeA + j.stakeB);
            
            document.getElementById('c_'+j.id).innerText = `R$ ${custoAcumulado.toFixed(2)}`;
            
            let liqA = (j.stakeA * j.oddA) - custoAcumulado;
            let liqB = (j.stakeB * j.oddB) - custoAcumulado;
            
            document.getElementById('la_'+j.id).innerText = liqA.toFixed(2);
            document.getElementById('la_'+j.id).className = liqA >= 0 ? "text-emerald-400" : "text-red-400";
            document.getElementById('lb_'+j.id).innerText = liqB.toFixed(2);
            document.getElementById('lb_'+j.id).className = liqB >= 0 ? "text-emerald-400" : "text-red-400";
        });
        document.getElementById('mtxtCustoTotal').innerText = `R$ ${custoAcumulado.toFixed(2)}`;
    }

    function adicionarCard() {
        banco.push({ id: Date.now(), oddA: 2.0, oddB: 2.0, stakeA: 0, stakeB: 0 });
        renderizar();
    }

    function deletarCard(id) {
        banco = banco.filter(x => x.id !== id);
        renderizar();
    }

    function salvarCenário() { alert("Cenário salvo!"); }

    renderizar();
</script>
</body>
</html>
