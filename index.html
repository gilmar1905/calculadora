<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Executivo Surebet - Corrigido</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #0f172a; }
        input { background: #1e293b !important; color: white !important; }
    </style>
</head>
<body class="text-slate-100 p-6">
<div class="max-w-7xl mx-auto space-y-6">
    <div class="bg-slate-950 p-6 rounded-xl border border-slate-800">
        <h1 class="text-2xl font-black">⚡ MOTOR SUREBET EXECUTIVO</h1>
        <button onclick="adicionarCard()" class="mt-4 bg-emerald-700 p-3 rounded w-full font-bold uppercase text-xs">Adicionar Novo Card (Proteção)</button>
    </div>

    <div id="mGrade" class="space-y-4"></div>

    <div class="bg-slate-950 p-6 rounded-xl border border-slate-800">
        <h2 class="text-xs font-bold uppercase mb-4">Consolidação: Custo Acumulado Total</h2>
        <span id="mtxtCustoTotal" class="text-3xl font-black">R$ 0,00</span>
    </div>
</div>

<script>
    let banco = [];

    function adicionarCard() {
        // Agora o card nasce com valores padrão para não quebrar o cálculo
        banco.push({ id: Date.now(), oddA: 2.0, oddB: 2.0, stakeA: 0, stakeB: 0 });
        renderizar();
    }

    function renderizar() {
        const grade = document.getElementById('mGrade');
        grade.innerHTML = '';
        banco.forEach(j => {
            grade.innerHTML += `
            <div class="bg-slate-950 p-4 rounded border border-slate-800">
                <div class="grid grid-cols-4 gap-2">
                    <input type="number" placeholder="Odd A" value="${j.oddA}" oninput="banco.find(x=>x.id==${j.id}).oddA=parseFloat(this.value)||0; processarCalculos()" class="p-2 text-center">
                    <input type="number" placeholder="Odd B" value="${j.oddB}" oninput="banco.find(x=>x.id==${j.id}).oddB=parseFloat(this.value)||0; processarCalculos()" class="p-2 text-center">
                    <input type="number" placeholder="Stake A" value="${j.stakeA}" oninput="banco.find(x=>x.id==${j.id}).stakeA=parseFloat(this.value)||0; processarCalculos()" class="p-2 text-center text-emerald-400 font-bold">
                    <input type="number" placeholder="Stake B" value="${j.stakeB}" oninput="banco.find(x=>x.id==${j.id}).stakeB=parseFloat(this.value)||0; processarCalculos()" class="p-2 text-center text-emerald-400 font-bold">
                </div>
                <div class="text-[10px] mt-2 text-slate-400">
                    Custo Acumulado: <span id="c_${j.id}" class="text-white">0</span> | 
                    Liq A: <span id="la_${j.id}">0</span> | 
                    Liq B: <span id="lb_${j.id}">0</span>
                </div>
            </div>`;
        });
        processarCalculos();
    }

    function processarCalculos() {
        let custoAcumulado = 0; // Se quiser considerar a Aposta Mãe, inicie aqui

        banco.forEach(j => {
            custoAcumulado += (j.stakeA + j.stakeB);
            
            document.getElementById('c_'+j.id).innerText = `R$ ${custoAcumulado.toFixed(2)}`;
            
            // Tratamento: só calcula se a odd for maior que zero para não dar erro
            let liqA = j.oddA > 0 ? (j.stakeA * j.oddA) - custoAcumulado : 0;
            let liqB = j.oddB > 0 ? (j.stakeB * j.oddB) - custoAcumulado : 0;
            
            document.getElementById('la_'+j.id).innerText = liqA.toFixed(2);
            document.getElementById('lb_'+j.id).innerText = liqB.toFixed(2);
        });

        document.getElementById('mtxtCustoTotal').innerText = `R$ ${custoAcumulado.toFixed(2)}`;
    }
</script>
</body>
</html>
