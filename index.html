<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Executivo Surebet - Estrutura Original</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #0f172a; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="text-slate-100 p-4">
    <div class="max-w-7xl mx-auto space-y-6">
        <div class="bg-slate-950 p-6 rounded-xl border border-slate-800 shadow-2xl">
            <h1 class="text-2xl font-black text-white">⚡ MOTOR SUREBET EXECUTIVO</h1>
            <div class="grid grid-cols-2 gap-4 mt-4">
                <input type="number" id="mstkApostaPrincipal" value="30.00" oninput="processarCalculos()" class="bg-slate-900 border border-slate-700 text-emerald-400 font-bold p-3 rounded-lg">
                <input type="number" id="moddTotalPrincipal" value="369.32" oninput="processarCalculos()" class="bg-slate-900 border border-slate-700 text-indigo-400 font-bold p-3 rounded-lg">
            </div>
        </div>

        <button onclick="adicionarCard()" class="bg-emerald-600 hover:bg-emerald-700 w-full font-bold py-3 rounded-lg">➕ ADICIONAR CARD</button>

        <div id="mGradeConfrontos" class="space-y-4"></div>
    </div>

    <script>
        let cards = [
            { id: 1, ativo: true, oddA: 2.45, oddB: 2.70, stakeA: 0, stakeB: 0 },
            { id: 2, ativo: true, oddA: 8.86, oddB: 8.32, stakeA: 0, stakeB: 0 },
            { id: 3, ativo: true, oddA: 21.90, oddB: 28.32, stakeA: 0, stakeB: 0 },
            { id: 4, ativo: true, oddA: 81.84, oddB: 92.11, stakeA: 0, stakeB: 0 },
            { id: 5, ativo: true, oddA: 232.53, oddB: 323.52, stakeA: 0, stakeB: 0 }
        ];

        function adicionarCard() {
            const id = cards.length > 0 ? Math.max(...cards.map(c => c.id)) + 1 : 1;
            cards.push({ id, ativo: true, oddA: 2.00, oddB: 2.00, stakeA: 0, stakeB: 0 });
            renderizar();
        }

        function excluirCard(id) {
            cards = cards.filter(c => c.id !== id);
            renderizar();
        }

        function ajustar(id, campo, delta) {
            const c = cards.find(x => x.id === id);
            if(campo === 'A') c.stakeA = Math.max(0, c.stakeA + delta);
            if(campo === 'B') c.stakeB = Math.max(0, c.stakeB + delta);
            renderizar();
        }

        function renderizar() {
            const grade = document.getElementById('mGradeConfrontos');
            grade.innerHTML = '';
            cards.forEach(c => {
                const div = document.createElement('div');
                div.className = "bg-slate-950 p-4 rounded-xl border border-slate-800";
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-3">
                            <input type="checkbox" ${c.ativo ? 'checked' : ''} onchange="cards.find(x=>x.id==${c.id}).ativo=this.checked; processarCalculos()">
                            <span class="font-bold text-sm">CARD #${c.id}</span>
                        </div>
                        <button onclick="excluirCard(${c.id})" class="text-red-400 text-xs font-bold uppercase">Excluir</button>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-900 p-3 rounded-lg border border-slate-700">
                            <input type="number" value="${c.oddA}" oninput="cards.find(x=>x.id==${c.id}).oddA=parseFloat(this.value); processarCalculos()" class="w-full bg-transparent text-center font-bold text-indigo-400">
                            <div class="flex gap-2 mt-2">
                                <button onclick="ajustar(${c.id}, 'A', -1)" class="bg-slate-800 px-3 rounded">-1</button>
                                <input type="number" value="${c.stakeA}" oninput="cards.find(x=>x.id==${c.id}).stakeA=parseFloat(this.value); processarCalculos()" class="w-full bg-slate-950 text-center font-bold text-emerald-400">
                                <button onclick="ajustar(${c.id}, 'A', 1)" class="bg-slate-800 px-3 rounded">+1</button>
                            </div>
                        </div>
                        <div class="bg-slate-900 p-3 rounded-lg border border-slate-700">
                            <input type="number" value="${c.oddB}" oninput="cards.find(x=>x.id==${c.id}).oddB=parseFloat(this.value); processarCalculos()" class="w-full bg-transparent text-center font-bold text-indigo-400">
                            <div class="flex gap-2 mt-2">
                                <button onclick="ajustar(${c.id}, 'B', -1)" class="bg-slate-800 px-3 rounded">-1</button>
                                <input type="number" value="${c.stakeB}" oninput="cards.find(x=>x.id==${c.id}).stakeB=parseFloat(this.value); processarCalculos()" class="w-full bg-slate-950 text-center font-bold text-emerald-400">
                                <button onclick="ajustar(${c.id}, 'B', 1)" class="bg-slate-800 px-3 rounded">+1</button>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 flex justify-between text-xs font-bold text-slate-500 uppercase">
                        <span>Custo: <span id="custo_${c.id}" class="text-white">R$ 0,00</span></span>
                        <span>Liq A: <span id="liqA_${c.id}" class="text-white">R$ 0,00</span></span>
                        <span>Liq B: <span id="liqB_${c.id}" class="text-white">R$ 0,00</span></span>
                    </div>
                `;
                grade.appendChild(div);
            });
            processarCalculos();
        }

        function processarCalculos() {
            let divida = parseFloat(document.getElementById('mstkApostaPrincipal').value) || 0;
            
            cards.forEach(c => {
                const elCusto = document.getElementById(`custo_${c.id}`);
                const elLiqA = document.getElementById(`liqA_${c.id}`);
                const elLiqB = document.getElementById(`liqB_${c.id}`);

                if (!c.ativo) {
                    elCusto.innerText = "R$ 0,00";
                    return;
                }

                let custoTotal = divida + c.stakeA + c.stakeB;
                elCusto.innerText = `R$ ${custoTotal.toFixed(2)}`;

                let liqA = (c.stakeA * c.oddA) - custoTotal;
                let liqB = (c.stakeB * c.oddB) - custoTotal;

                elLiqA.innerText = `R$ ${liqA.toFixed(2)}`;
                elLiqA.className = liqA >= 0 ? "text-emerald-400 font-bold" : "text-red-400 font-bold";
                elLiqB.innerText = `R$ ${liqB.toFixed(2)}`;
                elLiqB.className = liqB >= 0 ? "text-emerald-400 font-bold" : "text-red-400 font-bold";

                divida += (c.stakeA + c.stakeB);
            });
        }

        renderizar();
    </script>
</body>
</html>
