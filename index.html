<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Executivo Surebet - Sistema Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #0f172a; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="text-slate-100 p-6 custom-scrollbar">

<div class="max-w-7xl mx-auto space-y-6">
    <div class="bg-slate-950 p-6 rounded-xl border border-slate-800 shadow-xl">
        <h1 class="text-2xl font-black text-white">⚡ MOTOR SUREBET EXECUTIVO</h1>
        <div class="grid grid-cols-2 gap-4 mt-4">
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase">Aposta Principal (R$)</label>
                <input type="number" id="mstkApostaPrincipal" value="30.00" step="0.01" oninput="processarCalculosGlobais()" class="w-full bg-slate-900 p-2 rounded text-emerald-400 font-black">
            </div>
            <div>
                <label class="text-[10px] font-bold text-slate-400 uppercase">Odd Principal</label>
                <input type="number" id="moddTotalPrincipal" value="369.32" step="0.01" oninput="processarCalculosGlobais()" class="w-full bg-slate-900 p-2 rounded text-indigo-400 font-black">
            </div>
        </div>
        <div class="mt-4 p-3 bg-slate-900 rounded border border-slate-800">
            <span class="text-xs text-slate-400 uppercase font-bold">Modo de Cálculo:</span>
            <div class="flex gap-4 mt-2">
                <label><input type="radio" name="modoCalculo" value="prelive" checked onchange="processarCalculosGlobais()"> Pré-Live</label>
                <label><input type="radio" name="modoCalculo" value="etapas" onchange="processarCalculosGlobais()"> Por Etapas (Cascata)</label>
            </div>
        </div>
    </div>

    <div id="mGradeConfrontos" class="space-y-4"></div>

    <button onclick="adicionarNovoCardJogo()" class="w-full bg-emerald-700 p-4 rounded font-bold text-xs uppercase hover:bg-emerald-600 transition">Adicionar Card</button>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
            <span class="block text-[10px] text-slate-400 font-bold uppercase">Custo Total</span>
            <span id="mtxtAuditoriaCustoTotal" class="text-xl font-black">R$ 0,00</span>
        </div>
        <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
            <span class="block text-[10px] text-slate-400 font-bold uppercase">Retorno Principal</span>
            <span id="mtxtAuditoriaRetornoPrincipal" class="text-xl font-black text-indigo-400">R$ 0,00</span>
        </div>
        <div class="bg-slate-950 p-4 rounded-xl border border-slate-800 text-center">
            <span class="block text-[10px] text-slate-400 font-bold uppercase">Lucro Líquido</span>
            <span id="mtxtAuditoriaLucroLiquidoPrincipal" class="text-xl font-black text-emerald-400">R$ 0,00</span>
        </div>
    </div>
</div>

<script>
    let banco = [
        { id: 1, ativo: true, oddA: 2.45, oddB: 2.70, stakeA: 11.5, stakeB: 10.0 },
        { id: 2, ativo: true, oddA: 8.86, oddB: 8.32, stakeA: 3.8, stakeB: 4.0 },
        { id: 3, ativo: true, oddA: 21.90, oddB: 28.32, stakeA: 2.5, stakeB: 2.0 },
        { id: 4, ativo: true, oddA: 81.84, oddB: 92.11, stakeA: 3.0, stakeB: 3.0 },
        { id: 5, ativo: true, oddA: 232.53, oddB: 323.52, stakeA: 1.0, stakeB: 1.0 }
    ];

    function sincronizar() {
        banco.forEach(j => {
            j.ativo = document.getElementById(`chk_${j.id}`).checked;
            j.oddA = parseFloat(document.getElementById(`oddA_${j.id}`).value) || 0;
            j.oddB = parseFloat(document.getElementById(`oddB_${j.id}`).value) || 0;
            j.stakeA = parseFloat(document.getElementById(`stkA_${j.id}`).value) || 0;
            j.stakeB = parseFloat(document.getElementById(`stkB_${j.id}`).value) || 0;
        });
    }

    function processarCalculosGlobais() {
        sincronizar();
        const stakeM = parseFloat(document.getElementById('mstkApostaPrincipal').value) || 0;
        const oddM = parseFloat(document.getElementById('moddTotalPrincipal').value) || 0;
        const modo = document.querySelector('input[name="modoCalculo"]:checked').value;

        let custoTotalGlobal = stakeM;
        banco.forEach(j => { if(j.ativo) custoTotalGlobal += (j.stakeA + j.stakeB); });

        let acumuladorCascata = stakeM;
        banco.forEach(j => {
            if(j.ativo) {
                acumuladorCascata += (j.stakeA + j.stakeB);
                let custoVigente = (modo === 'prelive') ? custoTotalGlobal : acumuladorCascata;
                
                document.getElementById(`custo_${j.id}`).innerText = `R$ ${custoVigente.toFixed(2)}`;
                let liqA = (j.stakeA * j.oddA) - custoVigente;
                let liqB = (j.stakeB * j.oddB) - custoVigente;
                
                document.getElementById(`liqA_${j.id}`).innerText = liqA.toFixed(2);
                document.getElementById(`liqA_${j.id}`).className = liqA >= 0 ? "text-emerald-400" : "text-red-500";
                document.getElementById(`liqB_${j.id}`).innerText = liqB.toFixed(2);
                document.getElementById(`liqB_${j.id}`).className = liqB >= 0 ? "text-emerald-400" : "text-red-500";
            }
        });

        document.getElementById('mtxtAuditoriaCustoTotal').innerText = `R$ ${custoTotalGlobal.toFixed(2)}`;
        document.getElementById('mtxtAuditoriaRetornoPrincipal').innerText = `R$ ${(stakeM * oddM).toFixed(2)}`;
        document.getElementById('mtxtAuditoriaLucroLiquidoPrincipal').innerText = `R$ ${( (stakeM * oddM) - custoTotalGlobal ).toFixed(2)}`;
    }

    function renderizar() {
        const grade = document.getElementById('mGradeConfrontos');
        grade.innerHTML = '';
        banco.forEach(j => {
            grade.innerHTML += `
            <div class="bg-slate-950 p-4 rounded border border-slate-800">
                <input type="checkbox" id="chk_${j.id}" ${j.ativo?'checked':''} onchange="processarCalculosGlobais()"> Card #${j.id}
                <div class="grid grid-cols-4 gap-2 mt-2">
                    <input type="number" id="oddA_${j.id}" value="${j.oddA}" oninput="processarCalculosGlobais()" class="bg-slate-900 p-1 text-center">
                    <input type="number" id="oddB_${j.id}" value="${j.oddB}" oninput="processarCalculosGlobais()" class="bg-slate-900 p-1 text-center">
                    <input type="number" id="stkA_${j.id}" value="${j.stakeA}" oninput="processarCalculosGlobais()" class="bg-slate-900 p-1 text-center text-emerald-400">
                    <input type="number" id="stkB_${j.id}" value="${j.stakeB}" oninput="processarCalculosGlobais()" class="bg-slate-900 p-1 text-center text-emerald-400">
                </div>
                <div class="text-xs mt-2">Custo: <span id="custo_${j.id}">0</span> | Liq A: <span id="liqA_${j.id}">0</span> | Liq B: <span id="liqB_${j.id}">0</span></div>
            </div>`;
        });
        processarCalculosGlobais();
    }

    function adicionarNovoCardJogo() {
        banco.push({ id: Date.now(), ativo: true, oddA: 2.0, oddB: 2.0, stakeA: 0, stakeB: 0 });
        renderizar();
    }

    renderizar();
</script>
</body>
</html>
